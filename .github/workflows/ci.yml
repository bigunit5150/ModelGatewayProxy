name: CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ---------------------------------------------------------------------------
  # Test job — lint, type-check, unit tests with coverage
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: llmgateway_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/llmgateway_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Lint (ruff check)
        run: ruff check src/ tests/

      - name: Format check (ruff format)
        run: ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Run tests
        run: pytest --cov=src/llmgateway --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Deploy job — runs only on pushes to the default branch after tests pass
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Fly.io
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Wake Postgres cluster
        run: |
          set -euo pipefail

          echo "::group::Listing Postgres machines"
          MACHINES_JSON=$(flyctl machines list -a llm-gateway-db --json)
          MACHINE_ID=$(echo "$MACHINES_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          STATE=$(echo "$MACHINES_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['state'])")
          echo "Postgres machine: $MACHINE_ID (state: $STATE)"
          echo "::endgroup::"

          if [ "$STATE" = "started" ]; then
            echo "Postgres is already running"
          else
            echo "Starting Postgres machine $MACHINE_ID ..."
            flyctl machines start "$MACHINE_ID" -a llm-gateway-db || true

            echo "::group::Waiting for Postgres to reach started state"
            for i in $(seq 1 12); do
              STATE=$(flyctl machines list -a llm-gateway-db --json \
                | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['state'])" 2>/dev/null \
                || echo "unknown")
              echo "  attempt $i/12 — state: $STATE"
              if [ "$STATE" = "started" ]; then break; fi
              sleep 10
            done
            echo "::endgroup::"

            if [ "$STATE" != "started" ]; then
              echo "::error::Postgres failed to start after 2 minutes (state: $STATE)"
              exit 1
            fi
          fi

          # Give Postgres a moment to accept connections after reporting started
          echo "Waiting 5s for Postgres to accept connections ..."
          sleep 5
          echo "Postgres is ready"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
