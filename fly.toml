# fly.toml app configuration file generated for llm-gateway-ksmith on 2026-02-25T19:07:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'llm-gateway-ksmith'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'alembic upgrade head'

[env]
  LOG_LEVEL = 'INFO'
  OTEL_EXPORTER_OTLP_ENDPOINT = 'http://localhost:4318'
  OTEL_SERVICE_NAME = 'llm-gateway'

[[mounts]]
  source = 'model_cache'
  destination = '/app/.cache'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '10s'
    method = 'GET'
    path = '/health/ready'

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 1024

[[metrics]]
  port = 8000
  path = '/metrics'
