# Fly.io application configuration — LLM Gateway
# Docs: https://fly.io/docs/reference/configuration/

app = "llm-gateway-ksmith"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Run Alembic migrations before the new version receives traffic.
# Fly.io runs this command in a temporary VM using the new image.
[deploy]
  release_command = "alembic upgrade head"

# ---------------------------------------------------------------------------
# HTTP service
# ---------------------------------------------------------------------------
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  # Readiness probe — checks Redis + Postgres connectivity before routing traffic
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health/ready"
    timeout = "10s"

# ---------------------------------------------------------------------------
# VM sizing (2 vCPUs matches --workers 2 in the Dockerfile CMD)
# ---------------------------------------------------------------------------
[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024

# ---------------------------------------------------------------------------
# Static environment — secrets go in `flyctl secrets set`, not here
# ---------------------------------------------------------------------------
[env]
  LOG_LEVEL = "INFO"
  OTEL_SERVICE_NAME = "llm-gateway"
  # Disable OTEL export unless you have a collector reachable from Fly.io.
  # Set OTEL_EXPORTER_OTLP_ENDPOINT via `flyctl secrets set` to re-enable.
  OTEL_EXPORTER_OTLP_ENDPOINT = "http://localhost:4318"

# ---------------------------------------------------------------------------
# Prometheus metrics scraping (scraped by Fly.io's built-in metrics system)
# ---------------------------------------------------------------------------
[metrics]
  port = 8000
  path = "/metrics"

# ---------------------------------------------------------------------------
# Persistent volume for HuggingFace / sentence-transformers model cache.
# Create with: flyctl volumes create model_cache --size 2 --region iad
# ---------------------------------------------------------------------------
[[mounts]]
  source = "model_cache"
  destination = "/app/.cache"
